<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shiftboard</title>
  <link rel="icon" type="image/svg+xml" href="https://www.formulastudent.de/fileadmin/user_upload/all/CD/FSG-icon_v20161204.svg" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
<button class="logo" id="logoBtn" title="Shiftboard" aria-label="Shiftboard logo" style="border:none;cursor:pointer;background:none;padding:0;position:relative;">
  <img id="logoIcon" src="https://www.formulastudent.de/fileadmin/user_upload/all/CD/FSG_Logo/FSG_Logo_rgb.svg" alt="Formula Student Germany logo" style="height:36px;width:auto;display:block;" onerror="this.src='https://www.formulastudent.de/fileadmin/user_upload/all/CD/FSG_Logo/FSG_Logo_rgb.jpg';" />
  <img id="chickenHeadOverlay" src="" alt="" style="display:none;position:absolute;height:16px;width:auto;pointer-events:none;" />
</button>
<div style="margin-left:65px;">
  <div class="title">Shiftboard</div>
  <div class="sub" id="lastLoaded">Loading local JSON…</div>
</div>
      </div>
      <div class="topbar-right">
        <select id="personSelect" class="chip">
          <option value="">All photographers</option>
        </select>
        <button class="icon-btn" id="themeToggle">◐</button>
      </div>
    </header>

    <div class="controls">
      <div class="search-row">
        <input class="search" id="searchInput" type="search" placeholder="🔎 Search shifts, places, categories…" />
        <div class="seg">
          <button class="active" id="btnCards">Cards</button>
          <button id="btnTable">Table</button>
          <button id="btnTimeline">Timeline</button>
        </div>
      </div>
      <div class="chip-row" id="dateChips"></div>
      <div class="chip-row">
        <select id="catFilter" class="chip">
          <option value="">All categories</option>
        </select>
        <select id="relFilter" class="chip">
          <option value="">All relevance</option>
          <option value="yes">Shift</option>
          <option value="info">Info only</option>
        </select>
        <select id="refreshSelect" class="chip">
          <option value="0">Refresh: Off</option>
          <option value="30">Refresh: 30s</option>
          <option value="60">Refresh: 1m</option>
          <option value="300">Refresh: 5m</option>
        </select>
        <button id="togglePast" class="chip" title="Toggle fading of already-finished shifts today">🌙 Fading past</button>
      </div>
    </div>

    <div id="heroSection"></div>
    <div class="section-label" id="resultLabel"></div>

    <div class="view active" id="cardsView">
      <div class="cards" id="cardList"></div>
      <div class="empty" id="cardsEmpty" style="display:none">No shifts match the current filters.</div>
    </div>

    <div class="view" id="tableView">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-col="date">Date</th>
              <th data-col="from">Time</th>
              <th data-col="what">What</th>
              <th data-col="where">Where</th>
              <th data-col="category">Category</th>
              <th data-col="assigned">Assigned</th>
              <th data-col="comment">Notes</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="empty" id="tableEmpty" style="display:none">No shifts match the current filters.</div>
    </div>

    <div class="view" id="timelineView">
      <div class="timeline-wrap" id="timelineWrap">
        <div class="timeline-head" id="timelineHead"></div>
        <div class="timeline-info-rail" id="timelineInfoRail"></div>
        <div class="timeline-body" id="timelineBody"></div>
      </div>
      <div class="empty" id="timelineEmpty" style="display:none">No assignments match the current filters.</div>
    </div>

    <div class="loading" id="loadingMsg">Loading local data…</div>

    <footer class="app-footer">
      <a href="https://www.formulastudent.de/imprint" target="_blank" rel="noopener noreferrer">Imprint</a>
    </footer>
  </div>

  <nav class="bottom-nav">
    <button onclick="setPersonFilter('')">All shifts</button>
    <button onclick="setMyShifts()">My shifts</button>
    <button onclick="document.getElementById('catFilter').focus()">Filter</button>
    <button onclick="toggleView()">Toggle view</button>
  </nav>

<div id="chickenCursor" class="chicken-cursor" aria-hidden="true">🐔</div>
<div id="meteorLayer" class="meteor-layer" aria-hidden="true"></div>

<script src="./test-data.js"></script>
<script src="./app.js"></script>
<script src="./glitch.js" defer></script>
</body>
</html>
